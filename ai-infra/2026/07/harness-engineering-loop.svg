<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Harness Engineering 工程闭环</title>
  <desc id="desc">这张图展示团队如何把人的需求、上下文、规则、技能、工具、计划、执行、验收和审计连接成持续改进闭环。</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#18202a" stroke-opacity="0.045" stroke-width="1" />
    </pattern>
    <marker id="arrowhead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#546171" />
    </marker>
    <marker id="amberArrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b46a2b" />
    </marker>
    <style>
      .title{font:760 42px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#18202a}.subtitle{font:18px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#64707f}.section-title{font:720 22px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#18202a}.label{font:680 18px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#18202a}.small{font:14px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#64707f}.tiny{font:12px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#64707f}.card{fill:#fffdf8;stroke:#c8d0d8;stroke-width:1.4}.lane{fill:rgba(255,253,248,.66);stroke:#c8d0d8;stroke-width:1.4}.hub{fill:#102333;stroke:#102333}.hub-title{font:760 24px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#fffdf8}.hub-subtitle{font:14px 'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;fill:#d9e5ec}.arrow{fill:none;stroke:#546171;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowhead)}.return-arrow{fill:none;stroke:#b46a2b;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#amberArrow)}
    </style>
  </defs>
  <rect width="1400" height="880" fill="#f7f2e8" />
  <rect width="1400" height="880" fill="url(#grid)" />
  <text x="70" y="78" class="title">腾讯 Harness Engineering：把 AI Coding 做成工程闭环</text>
  <text x="72" y="112" class="subtitle">不是单点工具堆叠，而是把上下文、规则、工具、计划、验收和审计沉淀成可复用系统</text>
  <rect x="70" y="158" width="250" height="542" rx="12" class="lane" />
  <text x="98" y="202" class="section-title">人的输入</text>
  <rect x="102" y="235" width="186" height="86" rx="8" class="card" /><circle cx="126" cy="264" r="7" fill="#1e6f9f" /><text x="144" y="270" class="label">需求 / 想法</text><text x="126" y="296" class="small">先转成结构化输入</text>
  <rect x="102" y="348" width="186" height="86" rx="8" class="card" /><circle cx="126" cy="377" r="7" fill="#3f7d5a" /><text x="144" y="383" class="label">项目上下文</text><text x="126" y="409" class="small">代码、文档、业务背景</text>
  <rect x="102" y="461" width="186" height="86" rx="8" class="card" /><circle cx="126" cy="490" r="7" fill="#b46a2b" /><text x="144" y="496" class="label">验收标准</text><text x="126" y="522" class="small">人先定义做对什么</text>
  <rect x="390" y="158" width="620" height="542" rx="12" class="lane" />
  <text x="422" y="202" class="section-title">Harness 工程层</text>
  <rect x="558" y="250" width="292" height="180" rx="14" class="hub" /><text x="704" y="304" class="hub-title" text-anchor="middle">Agent = Model</text><text x="704" y="336" class="hub-title" text-anchor="middle">+ Harness</text><text x="704" y="370" class="hub-subtitle" text-anchor="middle">生成由模型完成</text><text x="704" y="400" class="hub-subtitle" text-anchor="middle">约束、组织和验证交给 Harness</text>
  <rect x="425" y="245" width="112" height="74" rx="8" class="card" /><text x="454" y="274" class="label">AGENTS</text><text x="455" y="298" class="small">项目索引</text>
  <rect x="425" y="356" width="112" height="74" rx="8" class="card" /><text x="456" y="385" class="label">Rules</text><text x="448" y="409" class="small">团队底线</text>
  <rect x="425" y="467" width="112" height="74" rx="8" class="card" /><text x="452" y="496" class="label">Skills</text><text x="445" y="520" class="small">经验复用</text>
  <rect x="872" y="245" width="112" height="74" rx="8" class="card" /><text x="904" y="274" class="label">MCP</text><text x="891" y="298" class="small">外部事实</text>
  <rect x="872" y="356" width="112" height="74" rx="8" class="card" /><text x="903" y="385" class="label">Spec</text><text x="894" y="409" class="small">需求固化</text>
  <rect x="872" y="467" width="112" height="74" rx="8" class="card" /><text x="903" y="496" class="label">Plan</text><text x="887" y="520" class="small">先审后写</text>
  <rect x="1068" y="158" width="262" height="542" rx="12" class="lane" />
  <text x="1100" y="202" class="section-title">工程产出</text>
  <rect x="1100" y="235" width="198" height="86" rx="8" class="card" /><circle cx="1124" cy="264" r="7" fill="#1e6f9f" /><text x="1142" y="270" class="label">代码 / 测试</text><text x="1124" y="296" class="small">按任务逐步执行</text>
  <rect x="1100" y="348" width="198" height="86" rx="8" class="card" /><circle cx="1124" cy="377" r="7" fill="#3f7d5a" /><text x="1142" y="383" class="label">Review / 验收</text><text x="1124" y="409" class="small">语法、逻辑、规范、架构</text>
  <rect x="1100" y="461" width="198" height="86" rx="8" class="card" /><circle cx="1124" cy="490" r="7" fill="#b46a2b" /><text x="1142" y="496" class="label">文档 / 归档</text><text x="1124" y="522" class="small">形成长期项目记忆</text>
  <svg id="edges" x="0" y="0" width="1400" height="880" viewBox="0 0 1400 880" overflow="visible"><path d="M320 428 C350 428, 360 340, 390 340" class="arrow" /><path d="M850 340 C912 340, 1000 340, 1068 340" class="arrow" /><path d="M704 430 C704 520, 794 590, 1100 590" class="arrow" /><path d="M1199 547 C1199 730, 1028 774, 1010 774" class="return-arrow" /><path d="M390 774 C300 774, 195 700, 195 548" class="return-arrow" /></svg>
  <rect x="390" y="735" width="620" height="78" rx="8" class="card" /><text x="424" y="768" class="label">harness-audit / 度量看板</text><text x="424" y="794" class="small">检查 AGENTS、Rules、Skills、MCP、Plan、工程规范和 Commit，让规范落地可复盘</text>
  <text x="960" y="730" class="tiny">结果反馈到规则、知识库和流程</text>
  <rect x="70" y="735" width="250" height="78" rx="8" class="card" /><text x="100" y="768" class="label">核心变化</text><text x="100" y="794" class="small">从个人手感，走向团队资产</text>
  <rect x="1068" y="735" width="262" height="78" rx="8" class="card" /><text x="1100" y="768" class="label">落地标准</text><text x="1100" y="794" class="small">可执行、可复用、可检查</text>
</svg>