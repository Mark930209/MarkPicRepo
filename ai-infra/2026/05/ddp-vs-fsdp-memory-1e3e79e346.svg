<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="900" viewBox="0 0 1880 900" role="img" aria-label="DDP vs FSDP：每卡完整副本还是分片状态">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1772" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">DDP vs FSDP：每卡完整副本还是分片状态</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">N 卡训练中 DDP 每卡持有完整模型状态，FSDP/ZeRO 将参数、梯度和优化器状态分片以降低每卡显存</tspan></text>
    <line x1="92" y1="150.0" x2="1788" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 490.0 334.0 C 514.0 334.0, 516.0 334.0, 540.0 334.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 490.0 624.0 C 514.0 624.0, 516.0 624.0, 540.0 624.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 910.0 334.0 C 934.0 334.0, 936.0 479.0, 960.0 479.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 910.0 624.0 C 934.0 624.0, 936.0 479.0, 960.0 479.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1330.0 479.0 C 1354.0 479.0, 1356.0 479.0, 1380.0 479.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle></g>
  <g>
            <g transform="translate(120.0,250.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">D0</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">DDP Rank 0</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">完整参数 + 完整梯度 + 完整优化器</tspan></text>
            </g>
            
            <g transform="translate(540.0,250.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">D1</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">DDP Rank 1</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">完整副本 · 反向 AllReduce 梯度</tspan></text>
            </g>
            
            <g transform="translate(120.0,540.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">F0</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">FSDP Rank 0</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">参数/梯度/优化器状态分片</tspan></text>
            </g>
            
            <g transform="translate(540.0,540.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">F1</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">FSDP Rank 1</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">只持本地 shard</tspan><tspan x="76.0" dy="21.0">计算时 all-gather</tspan></text>
            </g>
            
            <g transform="translate(960.0,395.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">网</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">通信位置</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">DDP backward AllReduce</tspan><tspan x="76.0" dy="21.0">FSDP forward/backward 都参与</tspan></text>
            </g>
            
            <g transform="translate(1380.0,395.0)">
              <rect width="370.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">选</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">选型标准</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">显存够先 DDP · 显存不够再分片</tspan></text>
            </g>
            </g>
  <g><rect x="484.2" y="287.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="515.0" y="302.0" text-anchor="middle"><tspan x="515.0" dy="0.0">梯度同步</tspan></text><rect x="484.2" y="577.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="515.0" y="592.0" text-anchor="middle"><tspan x="515.0" dy="0.0">状态分片</tspan></text><rect x="898.5" y="359.5" width="72.9" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="935.0" y="374.5" text-anchor="middle"><tspan x="935.0" dy="0.0">AllReduce</tspan></text><rect x="852.7" y="504.5" width="164.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="935.0" y="519.5" text-anchor="middle"><tspan x="935.0" dy="0.0">AllGather/ReduceScatter</tspan></text><rect x="1330.2" y="432.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1355.0" y="447.0" text-anchor="middle"><tspan x="1355.0" dy="0.0">按瓶颈</tspan></text></g>
</svg>
