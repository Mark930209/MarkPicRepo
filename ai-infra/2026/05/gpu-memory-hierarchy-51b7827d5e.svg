<svg xmlns="http://www.w3.org/2000/svg" width="1780" height="920" viewBox="0 0 1780 920" role="img" aria-label="GPU 内存层次：带宽越近，容量越小">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1672" height="832" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">GPU 内存层次：带宽越近，容量越小</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">HBM、L2、Shared Memory、Register 的容量与带宽梯度，解释为什么训练瓶颈经常不是算力峰值</tspan></text>
    <line x1="92" y1="150.0" x2="1688" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 430.0 450.0 C 450.0 450.0, 450.0 395.0, 470.0 395.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 790.0 395.0 C 810.0 395.0, 810.0 340.0, 830.0 340.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1150.0 340.0 C 1170.0 340.0, 1170.0 395.0, 1190.0 395.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1510.0 395.0 C 1375.6 395.0, 1324.4 635.0, 1190.0 635.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 790.0 635.0 C 504.4 635.0, 395.6 450.0, 110.0 450.0" marker-end="url(#arrow)" opacity="0.55" /><path id="edge-path-5" class="edge-path edge-flow" d="M 790.0 635.0 C 958.0 635.0, 1022.0 635.0, 1190.0 635.0" marker-end="url(#arrow)" opacity="0.55" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(110.0,370.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">01</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">HBM 显存</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">容量最大</tspan><tspan x="76.0" dy="21.0">A100 SXM 约 2 TB/s 量级</tspan></text>
            </g>
            
            <g transform="translate(470.0,315.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">02</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">L2 Cache</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">片上缓存 · 复用热点数据</tspan></text>
            </g>
            
            <g transform="translate(830.0,260.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">03</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Shared Memory</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">Block 内共享</tspan><tspan x="76.0" dy="21.0">手动组织复用</tspan></text>
            </g>
            
            <g transform="translate(1190.0,315.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">04</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">Register</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">线程私有 · 最快也最稀缺</tspan></text>
            </g>
            
            <g transform="translate(1190.0,555.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">算</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">SM / Tensor Core</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">矩阵乘计算 · 等数据也会空转</tspan></text>
            </g>
            
            <g transform="translate(470.0,555.0)">
              <rect width="320.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">查</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Profiling 读数</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">occupancy · 带宽</tspan><tspan x="76.0" dy="21.0">cache hit</tspan></text>
            </g>
            </g>
  <g><rect x="431.1" y="375.5" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="450.0" y="390.5" text-anchor="middle"><tspan x="450.0" dy="0.0">加载</tspan></text><rect x="791.1" y="320.5" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="810.0" y="335.5" text-anchor="middle"><tspan x="810.0" dy="0.0">缓存</tspan></text><rect x="1139.2" y="320.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1170.0" y="335.5" text-anchor="middle"><tspan x="1170.0" dy="0.0">喂给线程</tspan></text><rect x="1331.1" y="468.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1350.0" y="483.0" text-anchor="middle"><tspan x="1350.0" dy="0.0">计算</tspan></text><rect x="419.2" y="495.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="450.0" y="510.5" text-anchor="middle"><tspan x="450.0" dy="0.0">带宽计数</tspan></text><rect x="947.3" y="588.0" width="85.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="990.0" y="603.0" text-anchor="middle"><tspan x="990.0" dy="0.0">占用率与指令</tspan></text></g>
</svg>
