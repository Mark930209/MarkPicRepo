<svg xmlns="http://www.w3.org/2000/svg" width="2160" height="680" viewBox="0 0 2160 680" role="img" aria-label="NCCL 通信时序：DDP 和 FSDP 慢在不同位置">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="2052" height="592" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">NCCL 通信时序：DDP 和 FSDP 慢在不同位置</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">AllReduce、AllGather、ReduceScatter 在 backward 和 forward/backward 中出现的位置，解释 step time 高方差的来源</tspan></text>
    <line x1="92" y1="150.0" x2="2068" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 360.0 297.0 C 365.0 297.0, 365.0 297.0, 370.0 297.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 650.0 297.0 C 655.0 297.0, 655.0 297.0, 660.0 297.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 940.0 297.0 C 945.0 297.0, 945.0 497.0, 950.0 497.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1230.0 497.0 C 1235.0 497.0, 1235.0 497.0, 1240.0 497.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1520.0 497.0 C 1525.0 497.0, 1525.0 497.0, 1530.0 497.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1810.0 497.0 C 1815.0 497.0, 1815.0 497.0, 1820.0 497.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(80.0,220.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">D1</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">DDP forward</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">各 rank 完整模型独立算</tspan></text>
            </g>
            
            <g transform="translate(370.0,220.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">D2</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">DDP backward</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">梯度 bucket 逐步产生</tspan></text>
            </g>
            
            <g transform="translate(660.0,220.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">AR</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">AllReduce</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">同步所有 rank 梯度</tspan></text>
            </g>
            
            <g transform="translate(950.0,420.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">AG</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">AllGather 参数</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">FSDP 计算前拿齐参数</tspan></text>
            </g>
            
            <g transform="translate(1240.0,420.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">F1</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">FSDP forward</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">临时全量参数完成 layer</tspan></text>
            </g>
            
            <g transform="translate(1530.0,420.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">RS</tspan></text>
              <text class="node-title" x="76.0" y="41.0" text-anchor="start"><tspan x="76.0" dy="0.0">ReduceScatter</tspan><tspan x="76.0" dy="29.0">梯度</tspan></text>
              <text class="node-subtitle" x="76.0" y="119.0" text-anchor="start"><tspan x="76.0" dy="0.0">backward 后保留本地</tspan><tspan x="76.0" dy="21.0">shard</tspan></text>
            </g>
            
            <g transform="translate(1820.0,420.0)">
              <rect width="280.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">OP</tspan></text>
              <text class="node-title" x="76.0" y="41.0" text-anchor="start"><tspan x="76.0" dy="0.0">optimizer</tspan><tspan x="76.0" dy="29.0">step</tspan></text>
              <text class="node-subtitle" x="76.0" y="119.0" text-anchor="start"><tspan x="76.0" dy="0.0">更新 shard</tspan><tspan x="76.0" dy="21.0">进入下个 step</tspan></text>
            </g>
            </g>
  <g><rect x="346.1" y="250.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="365.0" y="265.0" text-anchor="middle"><tspan x="365.0" dy="0.0">计算</tspan></text><rect x="624.2" y="250.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="655.0" y="265.0" text-anchor="middle"><tspan x="655.0" dy="0.0">同步梯度</tspan></text><rect x="914.2" y="350.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="945.0" y="365.0" text-anchor="middle"><tspan x="945.0" dy="0.0">分片路线</tspan></text><rect x="1204.2" y="450.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1235.0" y="465.0" text-anchor="middle"><tspan x="1235.0" dy="0.0">临时拿齐</tspan></text><rect x="1500.2" y="450.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1525.0" y="465.0" text-anchor="middle"><tspan x="1525.0" dy="0.0">反向后</tspan></text><rect x="1770.5" y="450.0" width="89.0" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1815.0" y="465.0" text-anchor="middle"><tspan x="1815.0" dy="0.0">只更新 shard</tspan></text></g>
</svg>
