<svg xmlns="http://www.w3.org/2000/svg" width="2160" height="680" viewBox="0 0 2160 680" role="img" aria-label="分布式训练故障诊断：先判断哪个 rank 先坏">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="2052" height="592" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">分布式训练故障诊断：先判断哪个 rank 先坏</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">从训练卡住或报错出发，分流到 NCCL timeout、rank OOM、NaN/Inf 和初始化失败四类路径</tspan></text>
    <line x1="92" y1="150.0" x2="2068" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 370.0 415.0 C 371.0 415.0, 369.0 300.0, 370.0 300.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 660.0 300.0 C 661.0 300.0, 659.0 415.0, 660.0 415.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 950.0 415.0 C 951.0 415.0, 949.0 300.0, 950.0 300.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1240.0 300.0 C 1241.0 300.0, 1239.0 415.0, 1240.0 415.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1530.0 415.0 C 1531.0 415.0, 1529.0 300.0, 1530.0 300.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1820.0 300.0 C 1821.0 300.0, 1819.0 415.0, 1820.0 415.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(80.0,335.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">00</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">训练卡住/报错</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">step time 突增</tspan><tspan x="76.0" dy="21.0">rank 等待</tspan></text>
            </g>
            
            <g transform="translate(370.0,220.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">01</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">找第一异常 rank</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">对齐</tspan><tspan x="76.0" dy="21.0">stdout/stderr/NCCL log</tspan></text>
            </g>
            
            <g transform="translate(660.0,335.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">02</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">rank OOM</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">某 rank 先 OOM</tspan><tspan x="76.0" dy="21.0">其他 rank hang</tspan></text>
            </g>
            
            <g transform="translate(950.0,220.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">03</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">NCCL timeout</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">NCCL_DEBUG=INFO</tspan><tspan x="76.0" dy="21.0">网卡/IB/RoCE</tspan></text>
            </g>
            
            <g transform="translate(1240.0,335.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">04</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">NaN/Inf</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">梯度异常经 AllReduce</tspan><tspan x="76.0" dy="21.0">传播</tspan></text>
            </g>
            
            <g transform="translate(1530.0,220.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">05</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">初始化失败</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">rank/world</tspan><tspan x="76.0" dy="21.0">size/rendezvous/端口</tspan></text>
            </g>
            
            <g transform="translate(1820.0,335.0)">
              <rect width="290.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">06</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">隔离复现</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">缩小 world size</tspan><tspan x="76.0" dy="21.0">固定 seed</tspan></text>
            </g>
            </g>
  <g><rect x="333.2" y="310.5" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="370.0" y="325.5" text-anchor="middle"><tspan x="370.0" dy="0.0">先对齐日志</tspan></text><rect x="629.2" y="310.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="660.0" y="325.5" text-anchor="middle"><tspan x="660.0" dy="0.0">显存峰值</tspan></text><rect x="895.1" y="310.5" width="109.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="950.0" y="325.5" text-anchor="middle"><tspan x="950.0" dy="0.0">collective 等待</tspan></text><rect x="1209.2" y="310.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1240.0" y="325.5" text-anchor="middle"><tspan x="1240.0" dy="0.0">排除网络</tspan></text><rect x="1499.2" y="310.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1530.0" y="325.5" text-anchor="middle"><tspan x="1530.0" dy="0.0">排除数值</tspan></text><rect x="1789.2" y="310.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1820.0" y="325.5" text-anchor="middle"><tspan x="1820.0" dy="0.0">最小复现</tspan></text></g>
</svg>
