<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="850" viewBox="0 0 1840 850" role="img" aria-label="LLM 请求子系统故障速查：先定位层，再讨论模型">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1732" height="762" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">LLM 请求子系统故障速查：先定位层，再讨论模型</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">不同子系统的故障表现、用户感知和排查入口不同，质量下降经常不会变成错误码</tspan></text>
    <line x1="92" y1="150.0" x2="1748" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g></g>
  <g></g>
  <g>
            <g transform="translate(110.0,235.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">01</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">入口层</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：401/429/超限</tspan><tspan x="76.0" dy="21.0">查：网关日志/token 配额</tspan></text>
            </g>
            
            <g transform="translate(530.0,235.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">02</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">上下文组装</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：遗漏证据</tspan><tspan x="76.0" dy="21.0">查：最终 prompt/截断日志</tspan></text>
            </g>
            
            <g transform="translate(950.0,235.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">03</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">RAG 检索</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：依据错误</tspan><tspan x="76.0" dy="21.0">查：embedding/索引/rerank</tspan></text>
            </g>
            
            <g transform="translate(1370.0,235.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">04</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">推理队列</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：TTFT 抬高</tspan><tspan x="76.0" dy="21.0">查：等待时间/batch/活跃序列</tspan></text>
            </g>
            
            <g transform="translate(320.0,500.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">05</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">GPU 资源</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：OOM/重启</tspan><tspan x="76.0" dy="21.0">查：显存/KV cache/拓扑</tspan></text>
            </g>
            
            <g transform="translate(740.0,500.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">06</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">流式输出</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：中途卡住</tspan><tspan x="76.0" dy="21.0">查：取消信号/停止原因/释放</tspan></text>
            </g>
            
            <g transform="translate(1160.0,500.0)">
              <rect width="360.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">07</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">观测计费</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">表现：无法归因</tspan><tspan x="76.0" dy="21.0">查：trace/token/成本字段</tspan></text>
            </g>
            </g>
  <g></g>
</svg>
