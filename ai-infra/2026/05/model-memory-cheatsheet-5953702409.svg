              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">微</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">LoRA / QLoRA</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">冻结主体 · 训练 adapter</tspan><tspan x="76.0" dy="21.0">量化加载</tspan></text>
            </g>
            </g>
  <g><rect x="395.1" y="442.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="420.0" y="457.0" text-anchor="middle"><tspan x="420.0" dy="0.0">先算账</tspan></text><rect x="829.2" y="442.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="860.0" y="457.0" text-anchor="middle"><tspan x="860.0" dy="0.0">多卡分片</tspan></text><rect x="1049.2" y="442.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1080.0" y="457.0" text-anchor="middle"><tspan x="1080.0" dy="0.0">通信敏感</tspan></text><rect x="1489.2" y="442.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1520.0" y="457.0" text-anchor="middle"><tspan x="1520.0" dy="0.0">常转微调</tspan></text><rect x="719.2" y="587.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="750.0" y="602.0" text-anchor="middle"><tspan x="750.0" dy="0.0">降低每卡</tspan></text><rect x="1159.2" y="587.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1190.0" y="602.0" text-anchor="middle"><tspan x="1190.0" dy="0.0">改变目标</tspan></text></g>
