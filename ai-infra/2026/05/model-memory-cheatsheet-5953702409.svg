              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">全量训练需分片 · QLoRA 单卡更常见</tspan></text>
            </g>
            
            <g transform="translate(560.0,260.0)">
