              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">13</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">13B</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">全量训练更依赖多卡</tspan><tspan x="76.0" dy="21.0">激活值压力上升</tspan></text>
            </g>
            
            <g transform="translate(1000.0,260.0)">
              <rect width="380.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">34</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">34B</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">全量微调通常进入多机/高显存区间</tspan></text>
            </g>
            
            <g transform="translate(1440.0,260.0)">
              <rect width="380.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">70</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">70B</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">全量训练需严肃分片</tspan><tspan x="76.0" dy="21.0">QLoRA 仍需大显存</tspan></text>
            </g>
            
            <g transform="translate(340.0,550.0)">
              <rect width="380.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">全</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">全量训练</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">参数+梯度+Adam+激活全部参与</tspan></text>
            </g>
            
            <g transform="translate(780.0,550.0)">
              <rect width="380.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">分</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">ZeRO-3 / FSDP</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">状态分片 · 省显存换通信</tspan></text>
            </g>
            
            <g transform="translate(1220.0,550.0)">
              <rect width="380.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
