<svg xmlns="http://www.w3.org/2000/svg" width="1740" height="900" viewBox="0 0 1740 900" role="img" aria-label="AI 系统五类职责的岗位归属">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1632" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">AI 系统五类职责的岗位归属</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">训练、部署、治理、基础设施、质量监控五个维度，各由谁主导、谁协作</tspan></text>
    <line x1="92" y1="150.0" x2="1648" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 410.0 455.0 C 452.0 455.0, 468.0 415.0, 510.0 415.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 820.0 415.0 C 862.0 415.0, 878.0 455.0, 920.0 455.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 820.0 680.0 C 862.0 680.0, 878.0 455.0, 920.0 455.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1230.0 455.0 C 1272.0 455.0, 1288.0 455.0, 1330.0 455.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle></g>
  <g>
            <g transform="translate(100.0,360.0)">
              <rect width="310.0" height="190.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="73.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="99.0" text-anchor="middle"><tspan x="40.0" dy="0.0">gpu</tspan></text>
              <text class="node-title" x="76.0" y="73.5" text-anchor="start"><tspan x="76.0" dy="0.0">模型训练</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.5" text-anchor="start"><tspan x="76.0" dy="0.0">主导：算法工程师</tspan><tspan x="76.0" dy="21.0">支撑：AI Infra</tspan></text>
            </g>
            
            <g transform="translate(920.0,360.0)">
              <rect width="310.0" height="190.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="73.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="99.0" text-anchor="middle"><tspan x="40.0" dy="0.0">api</tspan></text>
              <text class="node-title" x="76.0" y="73.5" text-anchor="start"><tspan x="76.0" dy="0.0">推理部署</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.5" text-anchor="start"><tspan x="76.0" dy="0.0">主导：AI Infra</tspan><tspan x="76.0" dy="21.0">协作：后端工程师</tspan></text>
            </g>
            
            <g transform="translate(510.0,320.0)">
              <rect width="310.0" height="190.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="73.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="99.0" text-anchor="middle"><tspan x="40.0" dy="0.0">lock</tspan></text>
              <text class="node-title" x="76.0" y="73.5" text-anchor="start"><tspan x="76.0" dy="0.0">制品治理</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.5" text-anchor="start"><tspan x="76.0" dy="0.0">主导：AI Infra</tspan><tspan x="76.0" dy="21.0">协作：MLOps</tspan></text>
            </g>
            
            <g transform="translate(510.0,585.0)">
              <rect width="310.0" height="190.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="73.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="99.0" text-anchor="middle"><tspan x="40.0" dy="0.0">srv</tspan></text>
              <text class="node-title" x="76.0" y="73.5" text-anchor="start"><tspan x="76.0" dy="0.0">基础设施</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.5" text-anchor="start"><tspan x="76.0" dy="0.0">主导：DevOps/SRE</tspan><tspan x="76.0" dy="21.0">支撑：AI Infra</tspan></text>
            </g>
            
            <g transform="translate(1330.0,360.0)">
              <rect width="310.0" height="190.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="73.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="99.0" text-anchor="middle"><tspan x="40.0" dy="0.0">eye</tspan></text>
              <text class="node-title" x="76.0" y="73.5" text-anchor="start"><tspan x="76.0" dy="0.0">质量监控</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.5" text-anchor="start"><tspan x="76.0" dy="0.0">主导：AI Infra</tspan><tspan x="76.0" dy="21.0">协作：后端 / DevOps</tspan></text>
            </g>
            </g>
  <g><rect x="429.2" y="388.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="460.0" y="403.0" text-anchor="middle"><tspan x="460.0" dy="0.0">模型注册</tspan></text><rect x="839.2" y="388.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="870.0" y="403.0" text-anchor="middle"><tspan x="870.0" dy="0.0">版本发布</tspan></text><rect x="839.2" y="520.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="870.0" y="535.5" text-anchor="middle"><tspan x="870.0" dy="0.0">资源调度</tspan></text><rect x="1249.2" y="408.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1280.0" y="423.0" text-anchor="middle"><tspan x="1280.0" dy="0.0">指标采集</tspan></text></g>
</svg>
