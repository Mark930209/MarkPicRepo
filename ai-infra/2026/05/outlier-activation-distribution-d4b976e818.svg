<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="860" viewBox="0 0 1880 860" role="img" aria-label="Outlier Activation：少数通道决定量化误差上限">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1772" height="772" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">Outlier Activation：少数通道决定量化误差上限</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">大模型中少量 activation channel 范围异常大，朴素 per-tensor 量化会让正常通道分辨率变粗</tspan></text>
    <line x1="92" y1="150.0" x2="1788" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 440.0 429.0 C 633.2 429.0, 706.8 429.0, 900.0 429.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 840.0 309.0 C 865.2 309.0, 874.8 429.0, 900.0 429.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1240.0 429.0 C 1265.2 429.0, 1274.8 309.0, 1300.0 309.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 840.0 309.0 C 697.2 309.0, 642.8 669.0, 500.0 669.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 840.0 669.0 C 865.2 669.0, 874.8 669.0, 900.0 669.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1240.0 669.0 C 1265.2 669.0, 1274.8 669.0, 1300.0 669.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(100.0,350.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">常</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">多数正常通道</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">范围集中 · 需要细刻度表示</tspan></text>
            </g>
            
            <g transform="translate(500.0,230.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">高</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">少数异常通道</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">范围大很多 · 拉高全层 scale</tspan></text>
            </g>
            
            <g transform="translate(900.0,350.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">粗</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">朴素 per-tensor</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">一个 scale 覆盖所有 channel</tspan></text>
            </g>
            
            <g transform="translate(1300.0,230.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">损</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">误差集中爆发</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">正常通道分辨率变粗 · 任务掉点</tspan></text>
            </g>
            
            <g transform="translate(500.0,590.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">保</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">混合精度处理</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">outlier 保留高精度 · 其余量化</tspan></text>
            </g>
            
            <g transform="translate(900.0,590.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">平</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">平滑迁移</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">把 activation 难度迁移到</tspan><tspan x="76.0" dy="21.0">weight</tspan></text>
            </g>
            
            <g transform="translate(1300.0,590.0)">
              <rect width="340.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">稳</tspan></text>
              <text class="node-title" x="76.0" y="68.0" text-anchor="start"><tspan x="76.0" dy="0.0">质量更稳</tspan></text>
              <text class="node-subtitle" x="76.0" y="117.0" text-anchor="start"><tspan x="76.0" dy="0.0">先处理异常分布 · 再谈低 bit</tspan></text>
            </g>
            </g>
  <g><rect x="631.5" y="382.0" width="77.1" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="670.0" y="397.0" text-anchor="middle"><tspan x="670.0" dy="0.0">共享 scale</tspan></text><rect x="839.2" y="322.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="870.0" y="337.0" text-anchor="middle"><tspan x="870.0" dy="0.0">拉大范围</tspan></text><rect x="1239.2" y="322.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1270.0" y="337.0" text-anchor="middle"><tspan x="1270.0" dy="0.0">刻度变粗</tspan></text><rect x="639.2" y="442.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="670.0" y="457.0" text-anchor="middle"><tspan x="670.0" dy="0.0">单独保护</tspan></text><rect x="833.2" y="622.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="870.0" y="637.0" text-anchor="middle"><tspan x="870.0" dy="0.0">或迁移难度</tspan></text><rect x="1245.2" y="622.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1270.0" y="637.0" text-anchor="middle"><tspan x="1270.0" dy="0.0">再评估</tspan></text></g>
</svg>
