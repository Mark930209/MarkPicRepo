<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="980" viewBox="0 0 2140 980" role="img" aria-label="推理成本瀑布：从 GPU 时价到每 1K tokens">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="2032" height="892" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">推理成本瀑布：从 GPU 时价到每 1K tokens</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">用统一公式拆开 GPU 单价、卡数、利用率、吞吐和冗余，让账单变成可优化的工程变量</tspan></text>
    <line x1="92" y1="150.0" x2="2048" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 1160.0 198.0 C 710.6 198.0, 539.4 468.0, 90.0 468.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 420.0 468.0 C 440.0 468.0, 440.0 468.0, 460.0 468.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 790.0 468.0 C 810.0 468.0, 810.0 468.0, 830.0 468.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1160.0 468.0 C 1180.0 468.0, 1180.0 468.0, 1200.0 468.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1530.0 468.0 C 1550.0 468.0, 1550.0 468.0, 1570.0 468.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1900.0 468.0 C 1849.6 468.0, 1830.4 768.0, 1780.0 768.0" marker-end="url(#arrow)" /><path id="edge-path-6" class="edge-path edge-flow" d="M 1530.0 468.0 C 1391.4 468.0, 1338.6 768.0, 1200.0 768.0" marker-end="url(#arrow)" /><path id="edge-path-7" class="edge-path edge-flow" d="M 1530.0 768.0 C 1635.0 768.0, 1675.0 768.0, 1780.0 768.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="2.10s" repeatCount="indefinite"><mpath href="#edge-path-6" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="2.45s" repeatCount="indefinite"><mpath href="#edge-path-7" /></animateMotion></circle></g>
  <g>
            <g transform="translate(90.0,390.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">价</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">GPU 时价</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">示例变量：2 USD/GPU·h</tspan><tspan x="76.0" dy="21.0">以实际账单为准</tspan></text>
            </g>
            
            <g transform="translate(460.0,390.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">卡</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">GPU 数量</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">tensor parallel、热副本</tspan><tspan x="76.0" dy="21.0">峰值冗余都会增加卡数</tspan></text>
            </g>
            
            <g transform="translate(830.0,390.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">用</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">利用率折扣</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">有效成本 = GPU 成本 /</tspan><tspan x="76.0" dy="21.0">有效利用率</tspan></text>
            </g>
            
            <g transform="translate(1200.0,390.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">吞</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">吞吐折算</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">tokens/s 越高，每 1K tokens</tspan><tspan x="76.0" dy="21.0">分摊越低</tspan></text>
            </g>
            
            <g transform="translate(1570.0,390.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">空</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">冗余与空转</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">冷备、低峰</tspan><tspan x="76.0" dy="21.0">长尾请求和失败重试都要入账</tspan></text>
            </g>
            
            <g transform="translate(1780.0,690.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">单</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">$/1K tokens</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">统一口径后才能比较模型</tspan><tspan x="76.0" dy="21.0">功能和租户</tspan></text>
            </g>
            
            <g transform="translate(830.0,120.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">式</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">核心公式</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">GPU $/h × GPU 数 ÷ 利用率</tspan><tspan x="76.0" dy="21.0">÷ tokens/s × 1000/3600</tspan></text>
            </g>
            
            <g transform="translate(1200.0,690.0)">
              <rect width="330.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">归</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">归因维度</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">model、feature、tenant</tspan><tspan x="76.0" dy="21.0">user_type、request_class</tspan></text>
            </g>
            </g>
  <g><rect x="606.1" y="286.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="625.0" y="301.0" text-anchor="middle"><tspan x="625.0" dy="0.0">起点</tspan></text><rect x="427.1" y="421.0" width="25.9" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="440.0" y="436.0" text-anchor="middle"><tspan x="440.0" dy="0.0">乘</tspan></text><rect x="779.2" y="421.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="810.0" y="436.0" text-anchor="middle"><tspan x="810.0" dy="0.0">除利用率</tspan></text><rect x="1155.2" y="421.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1180.0" y="436.0" text-anchor="middle"><tspan x="1180.0" dy="0.0">除吞吐</tspan></text><rect x="1525.2" y="421.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1550.0" y="436.0" text-anchor="middle"><tspan x="1550.0" dy="0.0">加冗余</tspan></text><rect x="1797.3" y="571.0" width="85.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1840.0" y="586.0" text-anchor="middle"><tspan x="1840.0" dy="0.0">得到单位成本</tspan></text><rect x="1328.2" y="571.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1365.0" y="586.0" text-anchor="middle"><tspan x="1365.0" dy="0.0">按请求记录</tspan></text><rect x="1630.2" y="721.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1655.0" y="736.0" text-anchor="middle"><tspan x="1655.0" dy="0.0">可比较</tspan></text></g>
</svg>
