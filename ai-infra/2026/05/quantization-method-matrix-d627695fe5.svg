<svg xmlns="http://www.w3.org/2000/svg" width="1940" height="900" viewBox="0 0 1940 900" role="img" aria-label="量化方法矩阵：不是所有 INT4 都解决同一个问题">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1832" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">量化方法矩阵：不是所有 INT4 都解决同一个问题</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">GPTQ、AWQ、SmoothQuant、GGUF 和 bitsandbytes 的目标、硬件路径、量化时间和失效边界不同</tspan></text>
    <line x1="92" y1="150.0" x2="1848" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 460.0 332.0 C 749.8 332.0, 860.2 652.0, 1150.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 880.0 332.0 C 817.0 332.0, 793.0 652.0, 730.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1300.0 332.0 C 1060.6 332.0, 969.4 652.0, 730.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1720.0 332.0 C 1657.0 332.0, 1633.0 652.0, 1570.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 670.0 652.0 C 871.6 652.0, 948.4 652.0, 1150.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1090.0 652.0 C 1291.6 652.0, 1368.4 652.0, 1570.0 652.0" marker-end="url(#arrow)" /><path id="edge-path-6" class="edge-path edge-flow" d="M 1510.0 652.0 C 1535.2 652.0, 1544.8 652.0, 1570.0 652.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="2.10s" repeatCount="indefinite"><mpath href="#edge-path-6" /></animateMotion></circle></g>
  <g>
            <g transform="translate(100.0,250.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">G</tspan></text>
              <text class="node-title" x="76.0" y="71.0" text-anchor="start"><tspan x="76.0" dy="0.0">GPTQ</tspan></text>
              <text class="node-subtitle" x="76.0" y="120.0" text-anchor="start"><tspan x="76.0" dy="0.0">逐层 PTQ · 精度敏感 · 量化较慢</tspan></text>
            </g>
            
            <g transform="translate(520.0,250.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">A</tspan></text>
              <text class="node-title" x="76.0" y="60.5" text-anchor="start"><tspan x="76.0" dy="0.0">AWQ</tspan></text>
              <text class="node-subtitle" x="76.0" y="109.5" text-anchor="start"><tspan x="76.0" dy="0.0">保护重要权重 · 部署友好</tspan><tspan x="76.0" dy="21.0">校准关键</tspan></text>
            </g>
            
            <g transform="translate(940.0,250.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">S</tspan></text>
              <text class="node-title" x="76.0" y="60.5" text-anchor="start"><tspan x="76.0" dy="0.0">SmoothQuant</tspan></text>
              <text class="node-subtitle" x="76.0" y="109.5" text-anchor="start"><tspan x="76.0" dy="0.0">平滑 activation outlier</tspan><tspan x="76.0" dy="21.0">W8A8 加速</tspan></text>
            </g>
            
            <g transform="translate(1360.0,250.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">GF</tspan></text>
              <text class="node-title" x="76.0" y="60.5" text-anchor="start"><tspan x="76.0" dy="0.0">GGUF</tspan></text>
              <text class="node-subtitle" x="76.0" y="109.5" text-anchor="start"><tspan x="76.0" dy="0.0">llama.cpp 生态</tspan><tspan x="76.0" dy="21.0">CPU/边缘侧常见</tspan></text>
            </g>
            
            <g transform="translate(310.0,570.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">BB</tspan></text>
              <text class="node-title" x="76.0" y="71.0" text-anchor="start"><tspan x="76.0" dy="0.0">bitsandbytes</tspan></text>
              <text class="node-subtitle" x="76.0" y="120.0" text-anchor="start"><tspan x="76.0" dy="0.0">8bit/4bit 加载和 QLoRA 工作流</tspan></text>
            </g>
            
            <g transform="translate(730.0,570.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">核</tspan></text>
              <text class="node-title" x="76.0" y="60.5" text-anchor="start"><tspan x="76.0" dy="0.0">运行时 kernel</tspan></text>
              <text class="node-subtitle" x="76.0" y="109.5" text-anchor="start"><tspan x="76.0" dy="0.0">没有匹配 kernel</tspan><tspan x="76.0" dy="21.0">低 bit 也未必更快</tspan></text>
            </g>
            
            <g transform="translate(1150.0,570.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">评</tspan></text>
              <text class="node-title" x="76.0" y="71.0" text-anchor="start"><tspan x="76.0" dy="0.0">任务评估</tspan></text>
              <text class="node-subtitle" x="76.0" y="120.0" text-anchor="start"><tspan x="76.0" dy="0.0">困惑度只是代理 · 目标任务才算数</tspan></text>
            </g>
            
            <g transform="translate(1570.0,570.0)">
              <rect width="360.0" height="164.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="60.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="86.0" text-anchor="middle"><tspan x="40.0" dy="0.0">选</tspan></text>
              <text class="node-title" x="76.0" y="71.0" text-anchor="start"><tspan x="76.0" dy="0.0">选型结论</tspan></text>
              <text class="node-subtitle" x="76.0" y="120.0" text-anchor="start"><tspan x="76.0" dy="0.0">按场景、硬件、质量边界决定</tspan></text>
            </g>
            </g>
  <g><rect x="780.1" y="445.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="805.0" y="460.0" text-anchor="middle"><tspan x="805.0" dy="0.0">重精度</tspan></text><rect x="780.1" y="445.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="805.0" y="460.0" text-anchor="middle"><tspan x="805.0" dy="0.0">重部署</tspan></text><rect x="985.7" y="445.0" width="58.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1015.0" y="460.0" text-anchor="middle"><tspan x="1015.0" dy="0.0">重 W8A8</tspan></text><rect x="1614.2" y="445.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1645.0" y="460.0" text-anchor="middle"><tspan x="1645.0" dy="0.0">本地生态</tspan></text><rect x="879.2" y="605.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="910.0" y="620.0" text-anchor="middle"><tspan x="910.0" dy="0.0">微调路径</tspan></text><rect x="1299.2" y="605.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1330.0" y="620.0" text-anchor="middle"><tspan x="1330.0" dy="0.0">实测速度</tspan></text><rect x="1509.2" y="605.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1540.0" y="620.0" text-anchor="middle"><tspan x="1540.0" dy="0.0">质量门槛</tspan></text></g>
</svg>
