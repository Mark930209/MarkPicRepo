<svg xmlns="http://www.w3.org/2000/svg" width="1830" height="760" viewBox="0 0 1830 760" role="img" aria-label="团队规模与 AI Infra 职责边界的变化">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1722" height="672" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">团队规模与 AI Infra 职责边界的变化</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">10 人 / 50 人 / 500 人三种团队规模下，AI Infra 的工作重心与分工差异</tspan></text>
    <line x1="92" y1="150.0" x2="1738" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path" d="M 600.0 450.0 C 627.3 450.0, 637.7 490.0, 665.0 490.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path" d="M 1165.0 490.0 C 1192.3 490.0, 1202.7 450.0, 1230.0 450.0" marker-end="url(#arrow)" /></g>
  <g></g>
  <g>
            <g transform="translate(100.0,350.0)">
              <rect width="500.0" height="200.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="78.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="104.0" text-anchor="middle"><tspan x="40.0" dy="0.0">usr</tspan></text>
              <text class="node-title" x="76.0" y="89.0" text-anchor="start"><tspan x="76.0" dy="0.0">10 人小团队</tspan></text>
              <text class="node-subtitle" x="76.0" y="138.0" text-anchor="start"><tspan x="76.0" dy="0.0">边界模糊 · 先建版本追踪和回滚 · 避免治理债</tspan></text>
            </g>
            
            <g transform="translate(665.0,390.0)">
              <rect width="500.0" height="200.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="78.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="104.0" text-anchor="middle"><tspan x="40.0" dy="0.0">usr</tspan></text>
              <text class="node-title" x="76.0" y="78.5" text-anchor="start"><tspan x="76.0" dy="0.0">50 人中型团队</tspan></text>
              <text class="node-subtitle" x="76.0" y="127.5" text-anchor="start"><tspan x="76.0" dy="0.0">2-4 人独立负责 · 建模型注册和标准部署</tspan><tspan x="76.0" dy="21.0">平衡算法灵活性与业务稳定性</tspan></text>
            </g>
            
            <g transform="translate(1230.0,350.0)">
              <rect width="500.0" height="200.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="78.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="104.0" text-anchor="middle"><tspan x="40.0" dy="0.0">srv</tspan></text>
              <text class="node-title" x="76.0" y="78.5" text-anchor="start"><tspan x="76.0" dy="0.0">500 人大型团队</tspan></text>
              <text class="node-subtitle" x="76.0" y="127.5" text-anchor="start"><tspan x="76.0" dy="0.0">训练 / 推理 / ML / 数据平台分工 · 面向内部用户</tspan><tspan x="76.0" dy="21.0">关注平台效率</tspan></text>
            </g>
            </g>
  <g><rect x="601.7" y="423.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="632.5" y="438.0" text-anchor="middle"><tspan x="632.5" dy="0.0">规模扩张</tspan></text><rect x="1166.7" y="423.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1197.5" y="438.0" text-anchor="middle"><tspan x="1197.5" dy="0.0">组织分化</tspan></text></g>
</svg>
