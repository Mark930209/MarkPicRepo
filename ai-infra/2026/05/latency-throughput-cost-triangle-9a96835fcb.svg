<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="900" viewBox="0 0 1760 900" role="img" aria-label="推理优化三角：低延迟、高吞吐、低成本不能同时拉满">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1652" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">推理优化三角：低延迟、高吞吐、低成本不能同时拉满</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">不同业务场景在 TTFT、TPOT、tokens/s 和成本之间选择不同落点，先定目标再调参数</tspan></text>
    <line x1="92" y1="150.0" x2="1668" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 1040.0 275.0 C 662.0 275.0, 518.0 720.0, 140.0 720.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 440.0 720.0 C 818.0 720.0, 962.0 720.0, 1340.0 720.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1040.0 275.0 C 1166.0 275.0, 1214.0 720.0, 1340.0 720.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 850.0 500.0 C 908.8 500.0, 931.2 500.0, 990.0 500.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 800.0 760.0 C 879.8 760.0, 910.2 500.0, 990.0 500.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1280.0 760.0 C 1158.2 760.0, 1111.8 500.0, 990.0 500.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(740.0,205.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">快</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">低延迟</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">TTFT/TPOT 优先</tspan><tspan x="76.0" dy="21.0">排队预算最小</tspan></text>
            </g>
            
            <g transform="translate(140.0,650.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">吞</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">高吞吐</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">tokens/s 优先</tspan><tspan x="76.0" dy="21.0">大 batch 更有利</tspan></text>
            </g>
            
            <g transform="translate(1340.0,650.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">省</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">低成本</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">$/1K tokens 优先</tspan><tspan x="76.0" dy="21.0">提高利用率</tspan></text>
            </g>
            
            <g transform="translate(550.0,430.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">聊</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">实时对话</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">靠近低延迟</tspan><tspan x="76.0" dy="21.0">TTFT 不能太长</tspan></text>
            </g>
            
            <g transform="translate(500.0,690.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">批</tspan></text>
              <text class="node-title" x="76.0" y="59.0" text-anchor="start"><tspan x="76.0" dy="0.0">文档批处理</tspan></text>
              <text class="node-subtitle" x="76.0" y="108.0" text-anchor="start"><tspan x="76.0" dy="0.0">靠近高吞吐 · 可接受排队</tspan></text>
            </g>
            
            <g transform="translate(980.0,690.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">内</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">内部工具</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">靠近低成本</tspan><tspan x="76.0" dy="21.0">峰值慢一些可接受</tspan></text>
            </g>
            
            <g transform="translate(990.0,430.0)">
              <rect width="300.0" height="140.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="48.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="74.0" text-anchor="middle"><tspan x="40.0" dy="0.0">选</tspan></text>
              <text class="node-title" x="76.0" y="48.5" text-anchor="start"><tspan x="76.0" dy="0.0">先选目标</tspan></text>
              <text class="node-subtitle" x="76.0" y="97.5" text-anchor="start"><tspan x="76.0" dy="0.0">目标不同</tspan><tspan x="76.0" dy="21.0">参数解释完全不同</tspan></text>
            </g>
            </g>
  <g><rect x="547.3" y="450.5" width="85.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="590.0" y="465.5" text-anchor="middle"><tspan x="590.0" dy="0.0">批更大会排队</tspan></text><rect x="841.4" y="673.0" width="97.3" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="890.0" y="688.0" text-anchor="middle"><tspan x="890.0" dy="0.0">利用率摊薄成本</tspan></text><rect x="1141.3" y="450.5" width="97.3" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1190.0" y="465.5" text-anchor="middle"><tspan x="1190.0" dy="0.0">低延迟常要冗余</tspan></text><rect x="884.7" y="453.0" width="70.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="920.0" y="468.0" text-anchor="middle"><tspan x="920.0" dy="0.0">TTFT 优先</tspan></text><rect x="864.2" y="583.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="895.0" y="598.0" text-anchor="middle"><tspan x="895.0" dy="0.0">吞吐优先</tspan></text><rect x="1104.2" y="583.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1135.0" y="598.0" text-anchor="middle"><tspan x="1135.0" dy="0.0">成本优先</tspan></text></g>
