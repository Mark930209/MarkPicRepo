              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">loss · eval score · throughput</tspan><tspan x="76.0" dy="21.0">cost</tspan></text>
            </g>
            
            <g transform="translate(600.0,520.0)">
