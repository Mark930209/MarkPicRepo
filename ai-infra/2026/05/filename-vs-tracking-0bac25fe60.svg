              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">Artifact lineage</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">dataset snapshot → checkpoint →</tspan><tspan x="76.0" dy="21.0">report</tspan></text>
            </g>
            
            <g transform="translate(1040.0,520.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">注</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">Model registry</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">版本阶段 · 审批记录 · 可回滚</tspan></text>
            </g>
            
            <g transform="translate(1400.0,385.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
