  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(120.0,245.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">名</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">best_v3_final.pt</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">不知道数据版本 · 不知道 seed</tspan></text>
            </g>
            
            <g transform="translate(120.0,520.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">名</tspan></text>
              <text class="node-title" x="76.0" y="73.0" text-anchor="start"><tspan x="76.0" dy="0.0">final_really_final.pt</tspan></text>
              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">不知道为什么被选中</tspan></text>
            </g>
            
            <g transform="translate(600.0,245.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">RUN</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">Run metadata</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">config hash · code commit</tspan><tspan x="76.0" dy="21.0">data hash · owner</tspan></text>
            </g>
            
            <g transform="translate(1040.0,245.0)">
              <rect width="390.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">指</tspan></text>
