              <text class="node-subtitle" x="76.0" y="122.0" text-anchor="start"><tspan x="76.0" dy="0.0">谁训的 · 用什么数据 · 为什么上线</tspan></text>
            </g>
            </g>
  <g><rect x="278.2" y="419.5" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="315.0" y="434.5" text-anchor="middle"><tspan x="315.0" dy="0.0">越命名越乱</tspan></text><rect x="984.2" y="282.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1015.0" y="297.0" text-anchor="middle"><tspan x="1015.0" dy="0.0">记录曲线</tspan></text><rect x="764.2" y="419.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="795.0" y="434.5" text-anchor="middle"><tspan x="795.0" dy="0.0">绑定产物</tspan></text><rect x="984.2" y="557.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1015.0" y="572.0" text-anchor="middle"><tspan x="1015.0" dy="0.0">注册版本</tspan></text><rect x="1384.2" y="352.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1415.0" y="367.0" text-anchor="middle"><tspan x="1415.0" dy="0.0">解释选择</tspan></text><rect x="1384.2" y="489.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1415.0" y="504.5" text-anchor="middle"><tspan x="1415.0" dy="0.0">审计回滚</tspan></text></g>
