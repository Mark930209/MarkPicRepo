              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">评测集、线上采样</tspan><tspan x="76.0" dy="21.0">拒答率和人工 review</tspan></text>
            </g>
            
            <g transform="translate(830.0,650.0)">
              <rect width="350.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">慢</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">延迟门禁</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">TTFT、TPOT</tspan><tspan x="76.0" dy="21.0">队列等待不能只看均值</tspan></text>
            </g>
            
            <g transform="translate(1220.0,650.0)">
              <rect width="350.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="57.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">稳</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">可靠性门禁</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">checkpoint、重试、兜底模型</tspan><tspan x="76.0" dy="21.0">按需容量</tspan></text>
            </g>
            
            <g transform="translate(1610.0,650.0)">
