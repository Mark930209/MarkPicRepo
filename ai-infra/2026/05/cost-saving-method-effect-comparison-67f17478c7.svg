              <text class="subtitle" x="40.0" y="83.0" text-anchor="middle"><tspan x="40.0" dy="0.0">抢</tspan></text>
              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">Spot / 抢占式</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">训练和批处理可用</tspan><tspan x="76.0" dy="21.0">中断风险必须可恢复</tspan></text>
            </g>
            
            <g transform="translate(440.0,650.0)">
