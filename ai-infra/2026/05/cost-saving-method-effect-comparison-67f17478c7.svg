              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">排序结论</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">先测基线，再按收益</tspan><tspan x="76.0" dy="21.0">风险和实施成本排队</tspan></text>
            </g>
            </g>
