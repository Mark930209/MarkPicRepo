              <text class="node-title" x="76.0" y="57.5" text-anchor="start"><tspan x="76.0" dy="0.0">批量合并</tspan></text>
              <text class="node-subtitle" x="76.0" y="106.5" text-anchor="start"><tspan x="76.0" dy="0.0">离线任务提高利用率</tspan><tspan x="76.0" dy="21.0">常见目标 20-40%</tspan></text>
            </g>
            
            <g transform="translate(1650.0,270.0)">
              <rect width="350.0" height="158.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
