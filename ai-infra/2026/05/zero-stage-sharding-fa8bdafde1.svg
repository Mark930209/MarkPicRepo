<svg xmlns="http://www.w3.org/2000/svg" width="2140" height="650" viewBox="0 0 2140 650" role="img" aria-label="ZeRO Stage 1/2/3：分片对象逐层增加">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="2032" height="562" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">ZeRO Stage 1/2/3：分片对象逐层增加</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">在 4 GPU 场景下展示优化器状态、梯度、参数如何逐步分片，以及每个阶段带来的通信权衡</tspan></text>
    <line x1="92" y1="150.0" x2="2048" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 390.0 400.0 C 405.0 400.0, 405.0 310.0, 420.0 310.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 720.0 310.0 C 735.0 310.0, 735.0 400.0, 750.0 400.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1050.0 400.0 C 1065.0 400.0, 1065.0 310.0, 1080.0 310.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1380.0 310.0 C 1395.0 310.0, 1395.0 400.0, 1410.0 400.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1710.0 400.0 C 1725.0 400.0, 1725.0 310.0, 1740.0 310.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle></g>
  <g>
            <g transform="translate(90.0,320.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">DP</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">普通数据并行</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">每卡完整参数/梯度/优化器</tspan><tspan x="76.0" dy="21.0">状态</tspan></text>
            </g>
            
            <g transform="translate(420.0,230.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">S1</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">ZeRO Stage 1</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">优化器状态分片</tspan><tspan x="76.0" dy="21.0">参数和梯度仍复制</tspan></text>
            </g>
            
            <g transform="translate(750.0,320.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">S2</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">ZeRO Stage 2</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">优化器状态 + 梯度分片</tspan></text>
            </g>
            
            <g transform="translate(1080.0,230.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">S3</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">ZeRO Stage 3</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">优化器 + 梯度 +</tspan><tspan x="76.0" dy="21.0">参数都分片</tspan></text>
            </g>
            
            <g transform="translate(1410.0,320.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">网</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">通信代价</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">all-gather</tspan><tspan x="76.0" dy="21.0">reduce-scatter…</tspan></text>
            </g>
            
            <g transform="translate(1740.0,230.0)">
              <rect width="300.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">选</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">选型结论</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">显存优先选高 Stage</tspan><tspan x="76.0" dy="21.0">吞吐要实测</tspan></text>
            </g>
            </g>
  <g><rect x="375.7" y="308.0" width="58.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="405.0" y="323.0" text-anchor="middle"><tspan x="405.0" dy="0.0">切 Adam</tspan></text><rect x="704.2" y="308.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="735.0" y="323.0" text-anchor="middle"><tspan x="735.0" dy="0.0">再切梯度</tspan></text><rect x="1034.2" y="308.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1065.0" y="323.0" text-anchor="middle"><tspan x="1065.0" dy="0.0">再切参数</tspan></text><rect x="1370.2" y="308.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1395.0" y="323.0" text-anchor="middle"><tspan x="1395.0" dy="0.0">换通信</tspan></text><rect x="1688.2" y="308.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1725.0" y="323.0" text-anchor="middle"><tspan x="1725.0" dy="0.0">按瓶颈选择</tspan></text></g>
</svg>
