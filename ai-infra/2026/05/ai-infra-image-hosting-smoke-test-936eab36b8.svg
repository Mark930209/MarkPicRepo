<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="AI Infra image hosting smoke test">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
      <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
      <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
      <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 19px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 12px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 12px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="58" width="1332" height="784" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
  <text x="90" y="128" class="title">AI Infra image hosting smoke test</text>
  <text x="92" y="160" class="subtitle">Structured diagram</text>
    <line x1="92" y1="214" x2="1348" y2="214" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 325.0 453.0 C 395.0 453.0, 283.8 495.0, 353.8 495.0" marker-end="url(#arrow)" /><text class="edge-label" x="339.4" y="456.0" text-anchor="middle">structure</text><path id="edge-path-1" class="edge-path edge-flow" d="M 578.8 495.0 C 648.8 495.0, 537.5 453.0, 607.5 453.0" marker-end="url(#arrow)" /><text class="edge-label" x="593.1" y="456.0" text-anchor="middle">render</text><path id="edge-path-2" class="edge-path edge-flow" d="M 832.5 453.0 C 902.5 453.0, 791.2 495.0, 861.2 495.0" marker-end="url(#arrow)" /><text class="edge-label" x="846.9" y="456.0" text-anchor="middle">export</text><path id="edge-path-3" class="edge-path edge-flow" d="M 1086.2 495.0 C 1156.2 495.0, 1045.0 453.0, 1115.0 453.0" marker-end="url(#arrow)" /><text class="edge-label" x="1100.6" y="456.0" text-anchor="middle">upload + insert</text></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle></g>
  <g>
            <g transform="translate(100.0,405.0)">
              <rect width="225" height="96" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="20" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text x="40" y="48" text-anchor="middle" class="subtitle">SO</text>
              <text x="76" y="39" class="node-title">Input</text>
              <text x="76" y="64" class="node-subtitle">Prompt or document context</text>
            </g>
            
            <g transform="translate(353.8,447.0)">
              <rect width="225" height="96" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="20" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text x="40" y="48" text-anchor="middle" class="subtitle">SO</text>
              <text x="76" y="39" class="node-title">Recipe</text>
              <text x="76" y="64" class="node-subtitle">Structured diagram intent</text>
            </g>
            
            <g transform="translate(607.5,405.0)">
              <rect width="225" height="96" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="20" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text x="40" y="48" text-anchor="middle" class="subtitle">RE</text>
              <text x="76" y="39" class="node-title">Renderer</text>
              <text x="76" y="64" class="node-subtitle">SVG, HTML, Canvas</text>
            </g>
            
            <g transform="translate(861.2,447.0)">
              <rect width="225" height="96" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="20" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text x="40" y="48" text-anchor="middle" class="subtitle">OU</text>
              <text x="76" y="39" class="node-title">Artifact</text>
              <text x="76" y="64" class="node-subtitle">SVG, PNG, GIF, WebP</text>
            </g>
            
            <g transform="translate(1115.0,405.0)">
              <rect width="225" height="96" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="20" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text x="40" y="48" text-anchor="middle" class="subtitle">OU</text>
              <text x="76" y="39" class="node-title">Markdown</text>
              <text x="76" y="64" class="node-subtitle">Inserted image block</text>
            </g>
            </g>
</svg>
