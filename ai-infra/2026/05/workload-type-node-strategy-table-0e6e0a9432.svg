    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">不同 GPU 工作负载对 Spot、checkpoint、弹性伸缩和节点隔离的要求不同，节点池策略要按负载拆</tspan></text>
