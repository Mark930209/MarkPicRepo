<svg xmlns="http://www.w3.org/2000/svg" width="2040" height="860" viewBox="0 0 2040 860" role="img" aria-label="PagedAttention Block Table：逻辑连续，物理不必连续">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1932" height="772" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">PagedAttention Block Table：逻辑连续，物理不必连续</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">请求的逻辑 token 块通过 block table 映射到物理 KV cache block，释放和共享可以在块粒度发生</tspan></text>
    <line x1="92" y1="150.0" x2="1948" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 420.0 437.0 C 444.0 437.0, 446.0 437.0, 470.0 437.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 800.0 437.0 C 824.0 437.0, 826.0 437.0, 850.0 437.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1180.0 437.0 C 1204.0 437.0, 1206.0 307.0, 1230.0 307.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1180.0 437.0 C 1204.0 437.0, 1206.0 587.0, 1230.0 587.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1560.0 307.0 C 1584.0 307.0, 1586.0 437.0, 1610.0 437.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1560.0 587.0 C 1584.0 587.0, 1586.0 437.0, 1610.0 437.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(90.0,360.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">逻</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">逻辑序列</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">token 0..N · 对请求保持连续</tspan></text>
            </g>
            
            <g transform="translate(470.0,360.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">切</tspan></text>
              <text class="node-title" x="76.0" y="55.5" text-anchor="start"><tspan x="76.0" dy="0.0">逻辑块</tspan></text>
              <text class="node-subtitle" x="76.0" y="104.5" text-anchor="start"><tspan x="76.0" dy="0.0">按固定 token 数切块</tspan><tspan x="76.0" dy="21.0">末块可不满</tspan></text>
            </g>
            
            <g transform="translate(850.0,360.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">表</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">Block table</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">逻辑块号 → 物理块号</tspan></text>
            </g>
            
            <g transform="translate(1230.0,230.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">A</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">物理块 A</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">KV cache page · 可非连续</tspan></text>
            </g>
            
            <g transform="translate(1230.0,510.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">B</tspan></text>
              <text class="node-title" x="76.0" y="66.0" text-anchor="start"><tspan x="76.0" dy="0.0">物理块 B</tspan></text>
              <text class="node-subtitle" x="76.0" y="115.0" text-anchor="start"><tspan x="76.0" dy="0.0">另一段 HBM · 同属一个请求</tspan></text>
            </g>
            
            <g transform="translate(1610.0,360.0)">
              <rect width="330.0" height="154.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="55.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="81.0" text-anchor="middle"><tspan x="40.0" dy="0.0">池</tspan></text>
              <text class="node-title" x="76.0" y="55.5" text-anchor="start"><tspan x="76.0" dy="0.0">块池管理</tspan></text>
              <text class="node-subtitle" x="76.0" y="104.5" text-anchor="start"><tspan x="76.0" dy="0.0">分配/释放/复用</tspan><tspan x="76.0" dy="21.0">支撑前缀缓存</tspan></text>
            </g>
            </g>
  <g><rect x="420.1" y="390.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="445.0" y="405.0" text-anchor="middle"><tspan x="445.0" dy="0.0">切成页</tspan></text><rect x="800.1" y="390.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="825.0" y="405.0" text-anchor="middle"><tspan x="825.0" dy="0.0">查映射</tspan></text><rect x="1179.6" y="325.0" width="50.9" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1205.0" y="340.0" text-anchor="middle"><tspan x="1205.0" dy="0.0">逻辑 0</tspan></text><rect x="1179.6" y="465.0" width="50.9" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1205.0" y="480.0" text-anchor="middle"><tspan x="1205.0" dy="0.0">逻辑 1</tspan></text><rect x="1560.2" y="325.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1585.0" y="340.0" text-anchor="middle"><tspan x="1585.0" dy="0.0">可复用</tspan></text><rect x="1560.2" y="465.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1585.0" y="480.0" text-anchor="middle"><tspan x="1585.0" dy="0.0">可释放</tspan></text></g>
</svg>
