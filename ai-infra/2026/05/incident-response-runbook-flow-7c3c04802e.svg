le"><tspan x="2002.5" dy="0.0">改进</tspan></text><rect x="1373.2" y="588.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1410.0" y="603.0" text-anchor="middle"><tspan x="1410.0" dy="0.0">下一次更快</tspan></text></g>
