              <rect x="18" y="65.5" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="91.5" text-anchor="middle"><tspan x="40.0" dy="0.0">RUN</tspan></text>
              <text class="node-title" x="76.0" y="76.5" text-anchor="start"><tspan x="76.0" dy="0.0">Run</tspan></text>
              <text class="node-subtitle" x="76.0" y="125.5" text-anchor="start"><tspan x="76.0" dy="0.0">一次训练执行 · run_id 是复盘入口</tspan></text>
            </g>
            
            <g transform="translate(500.0,180.0)">
              <rect width="340.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">参</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Parameters</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">learning_rate · batch</tspan><tspan x="76.0" dy="21.0">seed · config hash</tspan></text>
            </g>
            
            <g transform="translate(1120.0,180.0)">
              <rect width="340.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">指</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Metrics</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">loss/accuracy/throughput 随</tspan><tspan x="76.0" dy="21.0">step 变化</tspan></text>
            </g>
            
            <g transform="translate(500.0,620.0)">
              <rect width="340.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">物</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Artifacts</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">dataset snapshot</tspan><tspan x="76.0" dy="21.0">checkpoint · eval report</tspan></text>
            </g>
            
            <g transform="translate(1120.0,620.0)">
              <rect width="340.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">模</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">Model Version</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">注册阶段 · 版本 · lineage</tspan></text>
