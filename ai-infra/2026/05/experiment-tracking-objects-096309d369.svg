              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">负责人 · 变更说明 · 审批记录</tspan></text>
            </g>
            </g>
  <g><rect x="586.1" y="351.8" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="605.0" y="366.8" text-anchor="middle"><tspan x="605.0" dy="0.0">包含</tspan></text><rect x="776.1" y="321.8" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="795.0" y="336.8" text-anchor="middle"><tspan x="795.0" dy="0.0">配置</tspan></text><rect x="1106.1" y="321.8" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1125.0" y="336.8" text-anchor="middle"><tspan x="1125.0" dy="0.0">记录</tspan></text><rect x="796.1" y="541.8" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="815.0" y="556.8" text-anchor="middle"><tspan x="815.0" dy="0.0">产出</tspan></text><rect x="961.1" y="653.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="980.0" y="668.0" text-anchor="middle"><tspan x="980.0" dy="0.0">注册</tspan></text><rect x="1265.2" y="426.8" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1290.0" y="441.8" text-anchor="middle"><tspan x="1290.0" dy="0.0">解释权</tspan></text></g>
