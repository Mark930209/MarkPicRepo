<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="普通程序员转 AI Infra 的能力迁移地图">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
      <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
      <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
      <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 19px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 12px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 12px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="58" width="1492" height="864" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
  <text x="90" y="128" class="title">普通程序员转 AI Infra 的能力迁移地图</text>
  <text x="92" y="160" class="subtitle">把已有工程经验迁移到 AI 工作负载、交付、运行、治理和平台化能力</text>
    <line x1="92" y1="214" x2="1508" y2="214" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 315.0 368.0 C 385.0 368.0, 325.0 303.0, 395.0 303.0" marker-end="url(#arrow)" /><text class="edge-label" x="355.0" y="317.5" text-anchor="middle">进入 AI 上下文</text><path id="edge-path-1" class="edge-path edge-flow" d="M 620.0 303.0 C 690.0 303.0, 645.0 218.0, 715.0 218.0" marker-end="url(#arrow)" /><text class="edge-label" x="667.5" y="242.5" text-anchor="middle">产物化</text><path id="edge-path-2" class="edge-path edge-flow" d="M 620.0 303.0 C 690.0 303.0, 645.0 478.0, 715.0 478.0" marker-end="url(#arrow)" /><text class="edge-label" x="667.5" y="372.5" text-anchor="middle">服务化</text><path id="edge-path-3" class="edge-path edge-flow" d="M 940.0 218.0 C 1010.0 218.0, 965.0 348.0, 1035.0 348.0" marker-end="url(#arrow)" /><text class="edge-label" x="987.5" y="265.0" text-anchor="middle">发布门禁</text><path id="edge-path-4" class="edge-path edge-flow" d="M 940.0 478.0 C 1010.0 478.0, 965.0 348.0, 1035.0 348.0" marker-end="url(#arrow)" /><text class="edge-label" x="987.5" y="395.0" text-anchor="middle">运行反馈</text><path id="edge-path-5" class="edge-path edge-flow" d="M 1260.0 348.0 C 1330.0 348.0, 1255.0 348.0, 1325.0 348.0" marker-end="url(#arrow)" /><text class="edge-label" x="1292.5" y="330.0" text-anchor="middle">沉淀平台能力</text><path id="edge-path-6" class="edge-path edge-flow" d="M 315.0 368.0 C 385.0 368.0, 325.0 658.0, 395.0 658.0" marker-end="url(#arrow)" /><text class="edge-label" x="355.0" y="495.0" text-anchor="middle">先做小闭环</text><path id="edge-path-7" class="edge-path edge-flow" d="M 620.0 658.0 C 690.0 658.0, 645.0 478.0, 715.0 478.0" marker-end="url(#arrow)" /><text class="edge-label" x="667.5" y="550.0" text-anchor="middle">用真实指标练习</text></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="2.10s" repeatCount="indefinite"><mpath href="#edge-path-6" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="2.45s" repeatCount="indefinite"><mpath href="#edge-path-7" /></animateMotion></circle></g>
