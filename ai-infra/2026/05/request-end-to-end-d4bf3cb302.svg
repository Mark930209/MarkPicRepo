              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">06</tspan></text>
              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">GPU 解码</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">prefill</tspan><tspan x="76.0" dy="21.0">decode…</tspan></text>
            </g>
            
            <g transform="translate(1710.0,315.0)">
              <rect width="222.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="88.0" text-anchor="middle"><tspan x="40.0" dy="0.0">07</tspan></text>
              <text class="node-title" x="76.0" y="48.0" text-anchor="start"><tspan x="76.0" dy="0.0">Streaming</tspan><tspan x="76.0" dy="29.0">返回</tspan></text>
              <text class="node-subtitle" x="76.0" y="126.0" text-anchor="start"><tspan x="76.0" dy="0.0">首 token</tspan><tspan x="76.0" dy="21.0">取消 · 停止</tspan></text>
            </g>
            
            <g transform="translate(1980.0,315.0)">
              <rect width="222.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
