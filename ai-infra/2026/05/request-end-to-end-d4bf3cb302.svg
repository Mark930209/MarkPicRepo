              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">推理队列</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">continuous batching</tspan><tspan x="76.0" dy="21.0">等待</tspan></text>
            </g>
            
            <g transform="translate(1440.0,315.0)">
