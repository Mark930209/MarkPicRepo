              <text class="node-title" x="76.0" y="62.5" text-anchor="start"><tspan x="76.0" dy="0.0">上下文组装</tspan></text>
              <text class="node-subtitle" x="76.0" y="111.5" text-anchor="start"><tspan x="76.0" dy="0.0">RAG 召回</tspan><tspan x="76.0" dy="21.0">截断 · rerank</tspan></text>
            </g>
            
            <g transform="translate(1170.0,315.0)">
              <rect width="222.0" height="168.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="62.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
