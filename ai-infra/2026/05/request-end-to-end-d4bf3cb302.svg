            </g>
            </g>
  <g><rect x="317.1" y="352.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="336.0" y="367.0" text-anchor="middle"><tspan x="336.0" dy="0.0">进入</tspan></text><rect x="581.1" y="352.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="606.0" y="367.0" text-anchor="middle"><tspan x="606.0" dy="0.0">授权后</tspan></text><rect x="857.1" y="352.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="876.0" y="367.0" text-anchor="middle"><tspan x="876.0" dy="0.0">拼装</tspan></text><rect x="1107.5" y="352.0" width="77.1" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1146.0" y="367.0" text-anchor="middle"><tspan x="1146.0" dy="0.0">token 序列</tspan></text><rect x="1397.1" y="352.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1416.0" y="367.0" text-anchor="middle"><tspan x="1416.0" dy="0.0">调度</tspan></text><rect x="1647.5" y="352.0" width="77.1" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1686.0" y="367.0" text-anchor="middle"><tspan x="1686.0" dy="0.0">生成 token</tspan></text><rect x="1919.2" y="352.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1956.0" y="367.0" text-anchor="middle"><tspan x="1956.0" dy="0.0">记录与归因</tspan></text></g>
</svg>
