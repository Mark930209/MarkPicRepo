<svg xmlns="http://www.w3.org/2000/svg" width="1880" height="900" viewBox="0 0 1880 900" role="img" aria-label="Continuous Batching：请求不必同生共死">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1772" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">Continuous Batching：请求不必同生共死</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">静态 batch 要等同一批请求全部结束，continuous batching 在每个 decoding iteration 动态插入和移除请求</tspan></text>
    <line x1="92" y1="150.0" x2="1788" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 430.0 328.0 C 454.0 328.0, 456.0 328.0, 480.0 328.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 820.0 328.0 C 844.0 328.0, 846.0 328.0, 870.0 328.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 430.0 668.0 C 454.0 668.0, 456.0 668.0, 480.0 668.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 820.0 668.0 C 844.0 668.0, 846.0 668.0, 870.0 668.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1210.0 328.0 C 1234.0 328.0, 1236.0 498.0, 1260.0 498.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1210.0 668.0 C 1234.0 668.0, 1236.0 498.0, 1260.0 498.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(90.0,250.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">旧</tspan></text>
              <text class="node-title" x="76.0" y="67.0" text-anchor="start"><tspan x="76.0" dy="0.0">静态 batch 准入</tspan></text>
              <text class="node-subtitle" x="76.0" y="116.0" text-anchor="start"><tspan x="76.0" dy="0.0">等一批请求凑齐后统一执行</tspan></text>
            </g>
            
            <g transform="translate(480.0,250.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">跑</tspan></text>
              <text class="node-title" x="76.0" y="67.0" text-anchor="start"><tspan x="76.0" dy="0.0">同批一起 decode</tspan></text>
              <text class="node-subtitle" x="76.0" y="116.0" text-anchor="start"><tspan x="76.0" dy="0.0">短请求结束 · 长请求仍占 batch</tspan></text>
            </g>
            
            <g transform="translate(870.0,250.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">空</tspan></text>
              <text class="node-title" x="76.0" y="67.0" text-anchor="start"><tspan x="76.0" dy="0.0">空槽不能补</tspan></text>
              <text class="node-subtitle" x="76.0" y="116.0" text-anchor="start"><tspan x="76.0" dy="0.0">GPU 有空位 · 新请求仍在队列</tspan></text>
            </g>
            
            <g transform="translate(90.0,590.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">新</tspan></text>
              <text class="node-title" x="76.0" y="67.0" text-anchor="start"><tspan x="76.0" dy="0.0">每轮重新准入</tspan></text>
              <text class="node-subtitle" x="76.0" y="116.0" text-anchor="start"><tspan x="76.0" dy="0.0">iteration 间插入新请求</tspan></text>
            </g>
            
            <g transform="translate(480.0,590.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">轮</tspan></text>
              <text class="node-title" x="76.0" y="67.0" text-anchor="start"><tspan x="76.0" dy="0.0">活跃集合滚动</tspan></text>
              <text class="node-subtitle" x="76.0" y="116.0" text-anchor="start"><tspan x="76.0" dy="0.0">完成就移除 · 队列立刻补位</tspan></text>
            </g>
            
            <g transform="translate(870.0,590.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">满</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">减少 GPU 空转</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">吞吐提高</tspan><tspan x="76.0" dy="21.0">TTFT 受队列策略影响</tspan></text>
            </g>
            
            <g transform="translate(1260.0,420.0)">
              <rect width="340.0" height="156.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="56.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="82.0" text-anchor="middle"><tspan x="40.0" dy="0.0">调</tspan></text>
              <text class="node-title" x="76.0" y="56.5" text-anchor="start"><tspan x="76.0" dy="0.0">推理调度器</tspan></text>
              <text class="node-subtitle" x="76.0" y="105.5" text-anchor="start"><tspan x="76.0" dy="0.0">准入、抢占</tspan><tspan x="76.0" dy="21.0">KV 预算共同决定效果</tspan></text>
            </g>
            </g>
  <g><rect x="424.2" y="281.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="455.0" y="296.0" text-anchor="middle"><tspan x="455.0" dy="0.0">整批开始</tspan></text><rect x="808.2" y="281.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="845.0" y="296.0" text-anchor="middle"><tspan x="845.0" dy="0.0">短请求结束</tspan></text><rect x="424.2" y="621.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="455.0" y="636.0" text-anchor="middle"><tspan x="455.0" dy="0.0">每轮调整</tspan></text><rect x="814.2" y="621.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="845.0" y="636.0" text-anchor="middle"><tspan x="845.0" dy="0.0">持续补位</tspan></text><rect x="1204.2" y="366.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1235.0" y="381.0" text-anchor="middle"><tspan x="1235.0" dy="0.0">空转代价</tspan></text><rect x="1204.2" y="536.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1235.0" y="551.0" text-anchor="middle"><tspan x="1235.0" dy="0.0">调度收益</tspan></text></g>
</svg>
