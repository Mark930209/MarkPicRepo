<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="920" viewBox="0 0 1840 920" role="img" aria-label="Roofline：prefill 和 decode 落在不同瓶颈区">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1732" height="832" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">Roofline：prefill 和 decode 落在不同瓶颈区</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">用算术强度解释 compute bound 与 memory bandwidth bound 的分界，训练和推理优化策略由瓶颈决定</tspan></text>
    <line x1="92" y1="150.0" x2="1748" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 470.0 360.0 C 494.0 360.0, 496.0 310.0, 520.0 310.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 880.0 310.0 C 904.0 310.0, 906.0 310.0, 930.0 310.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 880.0 310.0 C 728.8 310.0, 671.2 600.0, 520.0 600.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 1290.0 310.0 C 1138.8 310.0, 1081.2 600.0, 930.0 600.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 880.0 600.0 C 1073.2 600.0, 1146.8 455.0, 1340.0 455.0" marker-end="url(#arrow)" /><path id="edge-path-5" class="edge-path edge-flow" d="M 1290.0 600.0 C 1314.0 600.0, 1316.0 455.0, 1340.0 455.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.75s" repeatCount="indefinite"><mpath href="#edge-path-5" /></animateMotion></circle></g>
  <g>
            <g transform="translate(110.0,280.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">X</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">算术强度</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">FLOP/byte</tspan><tspan x="76.0" dy="21.0">每搬 1 byte 做多少计算</tspan></text>
            </g>
            
            <g transform="translate(520.0,230.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">带</tspan></text>
              <text class="node-title" x="76.0" y="69.0" text-anchor="start"><tspan x="76.0" dy="0.0">Memory bound</tspan></text>
              <text class="node-subtitle" x="76.0" y="118.0" text-anchor="start"><tspan x="76.0" dy="0.0">低算术强度 · HBM 带宽先到上限</tspan></text>
            </g>
            
            <g transform="translate(930.0,230.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">算</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Compute bound</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">高算术强度</tspan><tspan x="76.0" dy="21.0">Tensor Core 峰值先到上限</tspan></text>
            </g>
            
            <g transform="translate(930.0,520.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">P</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Transformer prefill</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">长 prompt 并行计算</tspan><tspan x="76.0" dy="21.0">更接近 compute bound</tspan></text>
            </g>
            
            <g transform="translate(520.0,520.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">D</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">Transformer decode</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">逐 token 读 KV cache</tspan><tspan x="76.0" dy="21.0">更受带宽限制</tspan></text>
            </g>
            
            <g transform="translate(1340.0,375.0)">
              <rect width="360.0" height="160.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="58.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="84.0" text-anchor="middle"><tspan x="40.0" dy="0.0">策</tspan></text>
              <text class="node-title" x="76.0" y="58.5" text-anchor="start"><tspan x="76.0" dy="0.0">优化方向</tspan></text>
              <text class="node-subtitle" x="76.0" y="107.5" text-anchor="start"><tspan x="76.0" dy="0.0">带宽侧减数据搬运</tspan><tspan x="76.0" dy="21.0">算力侧提高大矩阵利用</tspan></text>
            </g>
            </g>
  <g><rect x="449.3" y="288.0" width="91.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="495.0" y="303.0" text-anchor="middle"><tspan x="495.0" dy="0.0">低 FLOP/byte</tspan></text><rect x="880.1" y="263.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="905.0" y="278.0" text-anchor="middle"><tspan x="905.0" dy="0.0">分界线</tspan></text><rect x="651.6" y="408.0" width="96.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="700.0" y="423.0" text-anchor="middle"><tspan x="700.0" dy="0.0">KV cache 读多</tspan></text><rect x="1073.2" y="408.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1110.0" y="423.0" text-anchor="middle"><tspan x="1110.0" dy="0.0">矩阵乘更满</tspan></text><rect x="1073.2" y="480.5" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1110.0" y="495.5" text-anchor="middle"><tspan x="1110.0" dy="0.0">减带宽压力</tspan></text><rect x="1272.3" y="480.5" width="85.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1315.0" y="495.5" text-anchor="middle"><tspan x="1315.0" dy="0.0">增大有效计算</tspan></text></g>
</svg>
