  <g><rect x="328.2" y="310.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="359.0" y="325.0" text-anchor="middle"><tspan x="359.0" dy="0.0">进入服务</tspan></text><rect x="655.7" y="310.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="686.5" y="325.0" text-anchor="middle"><tspan x="686.5" dy="0.0">调用模型</tspan></text><rect x="983.2" y="310.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1014.0" y="325.0" text-anchor="middle"><tspan x="1014.0" dy="0.0">返回结果</tspan></text><rect x="492.2" y="422.5" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="523.0" y="437.5" text-anchor="middle"><tspan x="523.0" dy="0.0">留下证据</tspan></text><rect x="655.7" y="535.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="686.5" y="550.0" text-anchor="middle"><tspan x="686.5" dy="0.0">复盘样本</tspan></text><rect x="983.2" y="535.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1014.0" y="550.0" text-anchor="middle"><tspan x="1014.0" dy="0.0">变更对比</tspan></text><rect x="1298.8" y="535.0" width="85.4" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1341.5" y="550.0" text-anchor="middle"><tspan x="1341.5" dy="0.0">可灰度可撤回</tspan></text></g>
