              <rect x="18" y="34.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="60.0" text-anchor="middle"><tspan x="40.0" dy="0.0">03</tspan></text>
              <text class="node-title" x="76.0" y="34.5" text-anchor="start"><tspan x="76.0" dy="0.0">模型调用</tspan></text>
              <text class="node-subtitle" x="76.0" y="83.5" text-anchor="start"><tspan x="76.0" dy="0.0">版本 · prompt</tspan><tspan x="76.0" dy="21.0">token 成本</tspan></text>
            </g>
            
            <g transform="translate(1053.0,285.0)">
