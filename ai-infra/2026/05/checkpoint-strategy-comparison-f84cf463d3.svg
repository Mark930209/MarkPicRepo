<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="900" viewBox="0 0 1900 900" role="img" aria-label="Checkpoint 策略：恢复能力比保存成功更重要">
  
    <defs>
      <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#071018" flood-opacity="0.14" />
      </filter>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
            <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#1f9d8a" />
      </marker>
            <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M2,2 L10,6 L2,10 Z" fill="#647485" opacity="0.35" />
      </marker>
            <marker id="dot-marker" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#1f9d8a" />
      </marker>
            <marker id="dot-muted" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="userSpaceOnUse">
        <circle cx="4" cy="4" r="3" fill="#647485" opacity="0.35" />
      </marker>
      <linearGradient id="neural-edge" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#1f9d8a" stop-opacity="0.15" />
        <stop offset="50%" stop-color="#5d74d8" stop-opacity="0.75" />
        <stop offset="100%" stop-color="#d88c3a" stop-opacity="0.2" />
      </linearGradient>
    </defs>
    
  
    <style>
      .title { font: 700 36px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .subtitle { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .node-title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .node-subtitle { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .edge-label { font: 650 14px Inter, Segoe UI, Arial, sans-serif; fill: #647485; }
      .panel-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #17212b; }
      .formula { font: 650 18px Consolas, Cascadia Mono, monospace; fill: #17212b; }
      .edge-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-dot-path { fill: none; stroke: #1f9d8a; stroke-width: 2.5; marker-end: url(#dot-marker); }
      .edge-flow { stroke-dasharray: 10 12; animation: dash 1.6s linear infinite; }
      .flow-token { fill: #d88c3a; filter: url(#soft-shadow); opacity: 0.9; }
      .neuron { fill: #ffffff; stroke: #1f9d8a; stroke-width: 2; }
      .neuron.hot { animation: neuronPulse 2.4s ease-in-out infinite; }
      .neural-link { stroke: url(#neural-edge); stroke-width: 1.3; opacity: 0.42; animation: linkPulse 3.8s ease-in-out infinite; }
      .heat-cell { animation: heatShift 3.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes neuronPulse { 0%,100% { filter: none; } 45% { filter: drop-shadow(0 0 14px #1f9d8a); } }
      @keyframes linkPulse { 0%,100% { opacity: 0.18; } 45% { opacity: 0.8; } }
      @keyframes heatShift { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
    </style>
    
  <rect width="100%" height="100%" fill="#f7f9fb" />
  <rect x="54" y="44" width="1792" height="812" rx="28" fill="#ffffff" opacity="0.72" stroke="#d6e0e6" />
    <text class="title" x="90.0" y="100.0" text-anchor="start"><tspan x="90.0" dy="0.0">Checkpoint 策略：恢复能力比保存成功更重要</tspan></text>
    <text class="subtitle" x="92.0" y="126.0" text-anchor="start"><tspan x="92.0" dy="0.0">全量、FSDP 分片、LoRA-only 三种 checkpoint 在存储大小、恢复速度、rank 数变化兼容性和实现复杂度上的权衡</tspan></text>
    <line x1="92" y1="150.0" x2="1808" y2="150.0" stroke="#d6e0e6" stroke-width="1" stroke-dasharray="4 12" opacity="0.7" />
  <g><path id="edge-path-0" class="edge-path edge-flow" d="M 500.0 335.0 C 432.8 335.0, 407.2 635.0, 340.0 635.0" marker-end="url(#arrow)" /><path id="edge-path-1" class="edge-path edge-flow" d="M 940.0 335.0 C 872.8 335.0, 847.2 635.0, 780.0 635.0" marker-end="url(#arrow)" /><path id="edge-path-2" class="edge-path edge-flow" d="M 1380.0 335.0 C 943.2 335.0, 776.8 635.0, 340.0 635.0" marker-end="url(#arrow)" /><path id="edge-path-3" class="edge-path edge-flow" d="M 720.0 635.0 C 745.2 635.0, 754.8 635.0, 780.0 635.0" marker-end="url(#arrow)" /><path id="edge-path-4" class="edge-path edge-flow" d="M 1160.0 635.0 C 1185.2 635.0, 1194.8 635.0, 1220.0 635.0" marker-end="url(#arrow)" /></g>
  <g><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.00s" repeatCount="indefinite"><mpath href="#edge-path-0" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.35s" repeatCount="indefinite"><mpath href="#edge-path-1" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="0.70s" repeatCount="indefinite"><mpath href="#edge-path-2" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite"><mpath href="#edge-path-3" /></animateMotion></circle><circle class="flow-token" r="7"><animateMotion dur="3.2s" begin="1.40s" repeatCount="indefinite"><mpath href="#edge-path-4" /></animateMotion></circle></g>
  <g>
            <g transform="translate(120.0,250.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">全</tspan></text>
              <text class="node-title" x="76.0" y="63.5" text-anchor="start"><tspan x="76.0" dy="0.0">全量 checkpoint</tspan></text>
              <text class="node-subtitle" x="76.0" y="112.5" text-anchor="start"><tspan x="76.0" dy="0.0">权重+优化器+调度器 · 恢复直观</tspan><tspan x="76.0" dy="21.0">文件巨大</tspan></text>
            </g>
            
            <g transform="translate(560.0,250.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">分</tspan></text>
              <text class="node-title" x="76.0" y="63.5" text-anchor="start"><tspan x="76.0" dy="0.0">FSDP 分片</tspan></text>
              <text class="node-subtitle" x="76.0" y="112.5" text-anchor="start"><tspan x="76.0" dy="0.0">StateDictType.SHARDED · 写入分散</tspan><tspan x="76.0" dy="21.0">恢复需规划</tspan></text>
            </g>
            
            <g transform="translate(1000.0,250.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">微</tspan></text>
              <text class="node-title" x="76.0" y="63.5" text-anchor="start"><tspan x="76.0" dy="0.0">LoRA-only</tspan></text>
              <text class="node-subtitle" x="76.0" y="112.5" text-anchor="start"><tspan x="76.0" dy="0.0">adapter 权重小</tspan><tspan x="76.0" dy="21.0">依赖 base model 和 config</tspan></text>
            </g>
            
            <g transform="translate(340.0,550.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">元</tspan></text>
              <text class="node-title" x="76.0" y="63.5" text-anchor="start"><tspan x="76.0" dy="0.0">必须保存元数据</tspan></text>
              <text class="node-subtitle" x="76.0" y="112.5" text-anchor="start"><tspan x="76.0" dy="0.0">代码版本 · 数据版本 · world size</tspan><tspan x="76.0" dy="21.0">tokenizer</tspan></text>
            </g>
            
            <g transform="translate(780.0,550.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">恢</tspan></text>
              <text class="node-title" x="76.0" y="74.0" text-anchor="start"><tspan x="76.0" dy="0.0">断点续训验证</tspan></text>
              <text class="node-subtitle" x="76.0" y="123.0" text-anchor="start"><tspan x="76.0" dy="0.0">从 checkpoint 真跑一个小 step</tspan></text>
            </g>
            
            <g transform="translate(1220.0,550.0)">
              <rect width="380.0" height="170.0" rx="16" fill="#ffffff" stroke="#d6e0e6" filter="url(#soft-shadow)" />
              <rect x="18" y="63.0" width="44" height="44" rx="12" fill="#eef4f7" stroke="#d6e0e6" />
              <text class="subtitle" x="40.0" y="89.0" text-anchor="middle"><tspan x="40.0" dy="0.0">迁</tspan></text>
              <text class="node-title" x="76.0" y="74.0" text-anchor="start"><tspan x="76.0" dy="0.0">rank 数变化迁移</tspan></text>
              <text class="node-subtitle" x="76.0" y="123.0" text-anchor="start"><tspan x="76.0" dy="0.0">需要显式转换或统一格式</tspan></text>
            </g>
            </g>
  <g><rect x="383.2" y="438.0" width="73.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="420.0" y="453.0" text-anchor="middle"><tspan x="420.0" dy="0.0">仍需上下文</tspan></text><rect x="829.2" y="438.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="860.0" y="453.0" text-anchor="middle"><tspan x="860.0" dy="0.0">恢复测试</tspan></text><rect x="824.7" y="438.0" width="70.5" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="860.0" y="453.0" text-anchor="middle"><tspan x="860.0" dy="0.0">绑定 base</tspan></text><rect x="725.1" y="588.0" width="49.7" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="750.0" y="603.0" text-anchor="middle"><tspan x="750.0" dy="0.0">可复现</tspan></text><rect x="1159.2" y="588.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1190.0" y="603.0" text-anchor="middle"><tspan x="1190.0" dy="0.0">拓扑变化</tspan></text></g>
</svg>
