              <text class="node-title" x="76.0" y="42.0" text-anchor="start"><tspan x="76.0" dy="0.0">PyTorch</tspan><tspan x="76.0" dy="29.0">Profiler</tspan></text>
              <text class="node-subtitle" x="76.0" y="120.0" text-anchor="start"><tspan x="76.0" dy="0.0">operator 时间</tspan><tspan x="76.0" dy="21.0">CPU/GPU trace</tspan></text>
            </g>
            
