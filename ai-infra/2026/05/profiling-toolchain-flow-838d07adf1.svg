  <g><rect x="324.2" y="301.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="355.0" y="316.0" text-anchor="middle"><tspan x="355.0" dy="0.0">先排等待</tspan></text><rect x="616.1" y="301.0" width="37.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="635.0" y="316.0" text-anchor="middle"><tspan x="635.0" dy="0.0">仍慢</tspan></text><rect x="884.2" y="301.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="915.0" y="316.0" text-anchor="middle"><tspan x="915.0" dy="0.0">怀疑显存</tspan></text><rect x="1152.6" y="301.0" width="84.8" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1195.0" y="316.0" text-anchor="middle"><tspan x="1195.0" dy="0.0">看 timeline</tspan></text><rect x="1433.2" y="301.0" width="83.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1475.0" y="316.0" text-anchor="middle"><tspan x="1475.0" dy="0.0">锁定 kernel</tspan></text><rect x="1724.2" y="301.0" width="61.6" height="28.0" rx="4" fill="#f7f9fb" opacity="0.92" /><text class="edge-label" x="1755.0" y="316.0" text-anchor="middle"><tspan x="1755.0" dy="0.0">改后复测</tspan></text></g>
